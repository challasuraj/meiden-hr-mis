<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Meiden HR MIS Login</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #061a40, #0d47a1, #1976d2);
            font-family: Arial, Helvetica, sans-serif;
            overflow: hidden;
        }

        .background-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(5px);
            opacity: 0.25;
            animation: floatShape 8s ease-in-out infinite;
        }

        .shape-one {
            width: 280px;
            height: 280px;
            background: #ffffff;
            top: -80px;
            left: -70px;
        }

        .shape-two {
            width: 350px;
            height: 350px;
            background: #42a5f5;
            right: -120px;
            bottom: -130px;
            animation-delay: 2s;
        }

        @keyframes floatShape {
            0%, 100% {
                transform: translateY(0) translateX(0);
            }

            50% {
                transform: translateY(25px) translateX(15px);
            }
        }

        .login-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 430px;
            padding: 38px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.28);
            animation: cardEntry 0.8s ease;
        }

        @keyframes cardEntry {
            from {
                opacity: 0;
                transform: translateY(35px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .logo-wrapper {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo-wrapper img {
            width: 180px;
            max-width: 100%;
            height: auto;
            object-fit: contain;
        }

        .login-title {
            text-align: center;
            color: #082b59;
            font-size: 27px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .login-subtitle {
            text-align: center;
            color: #6c757d;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .form-label {
            color: #1f3552;
            font-weight: 600;
        }

        .form-control {
            height: 50px;
            border-radius: 12px;
            border: 1px solid #cbd6e2;
            padding-left: 15px;
        }

        .form-control:focus {
            border-color: #1976d2;
            box-shadow: 0 0 0 0.2rem rgba(25, 118, 210, 0.15);
        }

        .login-button {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, #0d47a1, #1976d2);
            color: white;
            font-size: 16px;
            font-weight: 700;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(13, 71, 161, 0.3);
        }

        .login-button:active {
            transform: scale(0.98);
        }

        .alert {
            border-radius: 10px;
            font-size: 14px;
        }

        .footer-text {
            margin-top: 22px;
            text-align: center;
            color: #7c8794;
            font-size: 12px;
        }

        @media (max-width: 576px) {
            .login-card {
                margin: 18px;
                padding: 28px 22px;
            }

            .login-title {
                font-size: 23px;
            }

            .logo-wrapper img {
                width: 150px;
            }
        }
    </style>
</head>

<body>

    <div class="background-shape shape-one"></div>
    <div class="background-shape shape-two"></div>

    <div class="login-card">

        <div class="logo-wrapper">
            <img
                src="{{ url_for('static', filename='meiden_logo.png') }}"
                alt="Meiden T&D India Limited"
            >
        </div>

        <h1 class="login-title">HR & Admin MIS Portal</h1>
        <p class="login-subtitle">
            Please sign in to continue
        </p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div
                        class="alert alert-{{ 'danger' if category == 'error' else category }}"
                        role="alert"
                    >
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">

            <div class="mb-3">
                <label for="username" class="form-label">
                    Username
                </label>

                <input
                    type="text"
                    id="username"
                    name="username"
                    class="form-control"
                    placeholder="Enter username"
                    autocomplete="username"
                    required
                >
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">
                    Password
                </label>

                <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-control"
                    placeholder="Enter password"
                    autocomplete="current-password"
                    required
                >
            </div>

            <button type="submit" class="login-button">
                Sign In
            </button>

        </form>

        <div class="footer-text">
            Meiden T&D (India) Limited · HR MIS System
        </div>

    </div>

</body>
</html>
